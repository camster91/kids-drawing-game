name: kids_drawing
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  screenshot: ^3.0.0
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/stickers/star.svg
    - assets/stickers/heart.svg
    - assets/stickers/smiley.svg
    - assets/stickers/rocket.svg
    - assets/stickers/flower.svg
    - assets/stickers/cat.svg
